<style>
* { box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif; 
  max-width: 800px;
  margin: 2rem auto;
  padding: 1rem;
  line-height: 1.5;
  background: #f0f0f0;
}
.drop-zone {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
  background: white;
  transition: all 0.3s;
  position: relative;
}
.drop-zone.dragover {
  background: #e0f0ff;
  border-color: #0066cc;
}
.drop-zone.success::after {
  content: '✓';
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: #00cc00;
  font-size: 2rem;
}
.output {
  margin-top: 1rem;
  padding: 1rem;
  background: white;
  border-radius: 8px;
  display: none;
}
.output pre {
  overflow-x: auto;
  background: #f8f8f8;
  padding: 1rem;
  border-radius: 4px;
}
.mode-select, .size-controls {
  margin: 1rem 0;
  padding: 1rem;
  background: white;
  border-radius: 8px;
}
.size-controls input[type="number"] {
  width: 100px;
  padding: 0.3rem;
  margin: 0 0.5rem;
}
</style>
</head>
<body>

<h1>Image to Bytebeat Converter</h1>
<p>Drop an image (PNG/JPG) below to convert it to bytebeat code.</p>

<div class="mode-select">
  <label>
    <input type="radio" name="mode" value="color" checked> Color Mode
  </label>
  <label>
    <input type="radio" name="mode" value="greyscale"> Greyscale Mode
  </label>
</div>

<div class="size-controls">
  <label>
    Target Width: <input type="number" id="targetWidth" value="32" min="1" max="256">
  </label>
  <label>
    Target Height: <input type="number" id="targetHeight" value="32" min="1" max="256">
  </label>
</div>

<div class="drop-zone" id="dropZone">
  Drop image here or click to select
  <input type="file" id="fileInput" style="display:none" accept="image/*">
</div>

<div class="output" id="output">
  <h3>Generated Bytebeat Code:</h3>
  <pre id="codeOutput"></pre>
  <button id="copyBtn">Copy to Clipboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jimp@0.22.10/browser/lib/jimp.min.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const output = document.getElementById('output');
const codeOutput = document.getElementById('codeOutput');
const copyBtn = document.getElementById('copyBtn');
const modeInputs = document.getElementsByName('mode');
const targetWidth = document.getElementById('targetWidth');
const targetHeight = document.getElementById('targetHeight');

// Drag and drop handlers
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

dropZone.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  handleFile(e.target.files[0]);
});

function getSelectedMode() {
  return Array.from(modeInputs).find(input => input.checked).value;
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('Please select an image file');
    return;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    const buffer = e.target.result;
    
    try {
      const image = await Jimp.read(buffer);
      
      // Resize image to target dimensions
      image.resize(parseInt(targetWidth.value), parseInt(targetHeight.value));
      
      const width = image.bitmap.width;
      const height = image.bitmap.height;
      
      const mode = getSelectedMode();
      let finalCode = '';

      if (mode === 'greyscale') {
        const data = [];
        
        // Process image in greyscale
        for (let y = 0; y < height; y++) {
          let row = "";
          for (let x = 0; x < width; x++) {
            const pixel = image.getPixelColor(x, y);
            const rgba = Jimp.intToRGBA(pixel);
            // Convert to greyscale using luminosity method
            const grey = Math.floor((0.299 * rgba.r + 0.587 * rgba.g + 0.114 * rgba.b) / 26);
            row += grey;
          }
          data.push(row);
        }

        // Generate greyscale code
        let code = '[';
        for (let i = 0; i < height; i++) {
          code += `"${data[i]}"`;
          if (i < height - 1) code += ',';
        }
        code += `][t%${height}][(t>>8)%${width}]*28.4`;
        finalCode = `${code}`;

      } else {
        // Color mode
        const dataR = [], dataG = [], dataB = [];
        
        // Process image in color
        for (let y = 0; y < height; y++) {
          let rowR = "", rowG = "", rowB = "";
          for (let x = 0; x < width; x++) {
            const pixel = image.getPixelColor(x, y);
            const rgba = Jimp.intToRGBA(pixel);
            rowR += Math.floor(rgba.r / 26);
            rowG += Math.floor(rgba.g / 26);
            rowB += Math.floor(rgba.b / 26);
          }
          dataR.push(rowR);
          dataG.push(rowG);
          dataB.push(rowB);
        }

        // Generate color code
        let codeR = '[', codeG = '[', codeB = '[';
        
        for (let i = 0; i < height; i++) {
          codeR += `"${dataR[i]}"`;
          codeG += `"${dataG[i]}"`;
          codeB += `"${dataB[i]}"`;
          if (i < height - 1) {
            codeR += ',';
            codeG += ',';
            codeB += ',';
          }
        }
        
        const timeIndexing = `][t%${height}][(t>>8)%${width}]*28.4`;
        codeR += timeIndexing;
        codeG += timeIndexing;
        codeB += timeIndexing;
        
        finalCode = `[${codeR},${codeG},${codeB}]`;
      }

      // Display output
      output.style.display = 'block';
      codeOutput.textContent = finalCode;
      dropZone.classList.add('success');
      
      // Remove success checkmark after 3 seconds
      setTimeout(() => {
        dropZone.classList.remove('success');
      }, 3000);
      
    } catch (err) {
      alert('Error processing image: ' + err.message);
    }
  };
  
  reader.readAsArrayBuffer(file);
}

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(codeOutput.textContent)
    .then(() => alert('Code copied to clipboard!'))
    .catch(err => alert('Failed to copy: ' + err));
});

// Reprocess image when mode changes or size changes
modeInputs.forEach(input => {
  input.addEventListener('change', () => {
    if (fileInput.files[0]) {
      handleFile(fileInput.files[0]);
    }
  });
});

targetWidth.addEventListener('change', () => {
  if (fileInput.files[0]) {
    handleFile(fileInput.files[0]);
  }
});

targetHeight.addEventListener('change', () => {
  if (fileInput.files[0]) {
    handleFile(fileInput.files[0]);
  }
});
</script>

</body></html>
